name: test

on:
  push:
  pull_request:

jobs:
  plugin-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asdf
        shell: bash
        run: |
          git clone --depth 1 https://github.com/asdf-vm/asdf.git "$HOME/.asdf"

      - name: Test plugin
        shell: bash
        run: |
          . "$HOME/.asdf/asdf.sh"
          asdf plugin test varlock "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" 'varlock --help' --asdf-tool-version 1.3.0
