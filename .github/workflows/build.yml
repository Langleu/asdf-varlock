name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plugin-test:
    name: asdf plugin test
    runs-on: ubuntu-latest
    env:
      GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - name: asdf_plugin_test
        uses: asdf-vm/actions/plugin-test@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
        with:
          asdf_version: 0.19.0
          command: varlock --help
